{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center align-items-center" style="min-height:80vh;">
  <div class="col-lg-11">
    <div class="row bg-white shadow-lg rounded-4 overflow-hidden">

      <!-- LEFT IMAGE PANEL -->
      <div class="col-md-6 d-flex flex-column justify-content-center align-items-center p-5"
           style="background:linear-gradient(135deg,#2563eb,#1e40af);">
        <img src="https://static.vecteezy.com/system/resources/previews/017/415/572/large_2x/medical-team-doctor-nurse-surgeon-and-ppe-coat-png.png"
             style="max-width:260px;">
        <h3 class="text-white fw-bold mt-4">Join VRAJ Care</h3>
        <p class="text-white text-center opacity-75">
          Create an account to book appointments easily
        </p>
      </div>

      <!-- RIGHT FORM PANEL -->
      <div class="col-md-6 p-5 animate">
        <h3 class="fw-bold mb-4 text-center" style="color:#2563eb;">Register</h3>

        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password1" class="form-control" required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm Password</label>
            <input type="password" name="password2" class="form-control" required>
          </div>

          <button class="btn btn-primary w-100 py-2"
                  style="background:#2563eb;border:none;">
            Create Account
          </button>
        </form>

        <p class="text-center mt-4 text-secondary">
          Already have an account?
          <a href="/accounts/login/" class="fw-semibold text-decoration-none"
             style="color:#2563eb;">Login</a>
        </p>
      </div>

    </div>
  </div>
</div>

{% endblock %}
