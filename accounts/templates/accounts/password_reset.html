{% extends 'base.html' %}

{% block content %}

<div class="container mt-5" style="max-width:400px;">

    <h2 class="text-center mb-4">
        Forgot Password
    </h2>
    <p class="text-center text-secondary">
        Enter the email address registered with your account. We will send a secure reset link.
    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <input type="email" name="email" autocomplete="email" class="form-control" placeholder="Email address" required>
            {% if form.email.errors %}
                <div class="text-danger small mt-2">{{ form.email.errors }}</div>
            {% endif %}
        </div>

        <button type="submit"
                class="btn btn-primary w-100">
            Send Reset Link
        </button>

    </form>

</div>

{% endblock %}
