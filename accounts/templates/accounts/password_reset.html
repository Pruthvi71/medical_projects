{% extends 'base.html' %}

{% block content %}

<div class="container mt-5" style="max-width:400px;">

    <h2 class="text-center mb-4">
        Forgot Password
    </h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            {{ form.email }}
        </div>

        <button type="submit"
                class="btn btn-primary w-100">
            Send Reset Link
        </button>

    </form>

</div>

{% endblock %}
