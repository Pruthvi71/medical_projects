{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width:420px;">
    <h3 class="mb-3">Reset Password</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.email.label_tag }}
        {{ form.email }}

        <button type="submit" class="btn btn-primary w-100 mt-3">
            Send Reset Link
        </button>
    </form>
</div>
{% endblock %}
