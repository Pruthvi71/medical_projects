{% extends 'base.html' %}

{% block content %}

<div class="container mt-5" style="max-width:400px;">

    <h2 class="text-center mb-4">
        Set New Password
    </h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            {{ form.new_password1 }}
        </div>

        <div class="mb-3">
            {{ form.new_password2 }}
        </div>

        <button type="submit"
                class="btn btn-success w-100">
            Change Password
        </button>

    </form>

</div>

{% endblock %}
