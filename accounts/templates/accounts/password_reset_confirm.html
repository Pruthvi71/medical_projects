{% extends 'base.html' %}
{% block content %}
<div class="container" style="max-width:420px;">
    <h3 class="mb-3">Set New Password</h3>

    <form method="post">
        {% csrf_token %}

        {{ form.new_password1.label_tag }}
        {{ form.new_password1 }}

        {{ form.new_password2.label_tag }}
        {{ form.new_password2 }}

        <button type="submit" class="btn btn-primary w-100 mt-3">
            Change Password
        </button>
    </form>
</div>
{% endblock %}
