{% extends "base.html" %}
{% block content %}

<div class="d-flex align-items-center justify-content-center" style="min-height:85vh;">
    <div class="bg-white shadow-lg rounded-4 p-5" style="width:420px;">

        <h3 class="text-center fw-bold mb-2 text-primary">
            Doctor Portal Login
        </h3>

        <p class="text-center text-muted mb-4">
            Login to manage appointments
        </p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100 py-2 fw-semibold">
                Login as Doctor
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="/" class="text-decoration-none">
                ← Back to Home
            </a>
        </div>

    </div>
</div>

{% endblock %}
