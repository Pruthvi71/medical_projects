{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center align-items-center" style="min-height:65vh;">
    <div class="col-lg-6">

        <div class="bg-white shadow rounded-4 p-5 text-center animate">

            <h2 class="fw-bold mb-3">Book Appointment</h2>
            <p class="text-secondary mb-4">
                Select a doctor and choose your preferred appointment date.
            </p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} text-start">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <!-- Doctor -->
                <div class="mb-3 text-start">
                    <label class="form-label fw-semibold">Select Doctor</label>
                    <select name="doctor" class="form-control" required>
                        <option value="">-- Choose Doctor --</option>
                        {% for doctor in doctors %}
                            <option value="{{ doctor.id }}">
                                Dr. {{ doctor.display_name }} ({{ doctor.specialization }})
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Date -->
                <div class="mb-4 text-start">
                    <label class="form-label fw-semibold">Appointment Date</label>
                    <input type="date" name="date" class="form-control" min="{% now 'Y-m-d' %}" required>
                </div>

                <!-- Button -->
                <button type="submit" class="btn btn-main w-100">
                    Confirm Appointment
                </button>
            </form>

        </div>

    </div>
</div>

{% endblock %}
